<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kour.io Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui}
body{
  background:#05060a;
  color:#fff;
  overflow:hidden;
}

/* STARFIELD */
canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
}

/* TOP NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,255,255,0.1);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  color:#00e5ff;
}

.tabs{
  display:flex;
  gap:10px;
}

.tab{
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  opacity:0.7;
  transition:0.2s;
  border:1px solid transparent;
}
.tab:hover{
  opacity:1;
  border:1px solid rgba(0,255,255,0.2);
}
.tab.active{
  opacity:1;
  background:rgba(0,229,255,0.1);
  border:1px solid rgba(0,229,255,0.4);
}

/* LAYOUT */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:calc(100vh - 60px);
}

.card{
  width:420px;
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(0,255,255,0.15);
  backdrop-filter:blur(16px);
  box-shadow:0 0 30px rgba(0,229,255,0.08);
}

/* ICON */
.iconWrap{
  display:flex;
  align-items:center;
  gap:15px;
}

#icon{
  width:60px;
  height:60px;
  border-radius:14px;
  background:rgba(0,0,0,0.4);
}

/* STATUS */
.status{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  font-size:13px;
}
.dot{
  width:10px;height:10px;
  background:#00ff88;
  border-radius:50%;
  box-shadow:0 0 10px #00ff88;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(1.4);opacity:0.6}
  100%{transform:scale(1);opacity:1}
}

/* FEATURES */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}
.feature{
  padding:10px;
  border-radius:12px;
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(0,255,255,0.1);
  font-size:12px;
  text-align:center;
}

/* SUPPORT */
textarea, input{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#00e5ff,#7c4dff);
  color:white;
  font-weight:bold;
}

/* PAGE SWITCH */
.page{display:none}
.page.active{display:block}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="nav">
  <div class="brand">
    <div id="miniIcon"></div>
    Kour.io Hub
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('home')">Home</div>
    <div class="tab" onclick="showTab('tools')">Tools</div>
    <div class="tab" onclick="showTab('support')">Support</div>
  </div>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <div class="iconWrap">
      <canvas id="icon"></canvas>
      <div>
        <h2 style="color:#00e5ff">Dashboard</h2>
        <div class="status">
          <div class="dot"></div>
          System Online
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOOLS -->
<div id="tools" class="page">
  <div class="card">
    <h2 style="color:#00e5ff">Tools</h2>

    <div class="grid">
      <div class="feature">🎯 Aim Trainer</div>
      <div class="feature">🧠 Reaction Lab</div>
      <div class="feature">🚀 Movement Drill</div>
      <div class="feature">📊 Stats Panel</div>
    </div>
  </div>
</div>

<!-- SUPPORT -->
<div id="support" class="page">
  <div class="card">
    <h2 style="color:#00e5ff">Support</h2>

    <input placeholder="Your name"/>
    <textarea rows="5" placeholder="Describe your issue..."></textarea>
    <button onclick="sendSupport()">Send Ticket</button>
  </div>
</div>

</div>

<script>
/* TAB SYSTEM */
function showTab(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

/* SUPPORT FAKE SUBMIT */
function sendSupport(){
  alert("Support ticket sent (demo)");
}

/* PROCEDURAL ICON (NEON IDENTITY) */
function drawIcon(canvas){
  const ctx = canvas.getContext("2d");
  const size = canvas.width = canvas.height = 60;

  const seed = Math.random()*9999;

  ctx.clearRect(0,0,size,size);

  for(let i=0;i<6;i++){
    ctx.fillStyle = `hsl(${(seed+i*40)%360},100%,60%)`;
    ctx.beginPath();
    ctx.arc(
      Math.random()*size,
      Math.random()*size,
      Math.random()*10+3,
      0,Math.PI*2
    );
    ctx.fill();
  }
}

/* INIT ICONS */
drawIcon(document.getElementById("icon"));
drawIcon(document.getElementById("miniIcon"));

/* STARFIELD */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h,stars=[];
let mx=0,my=0;

function init(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;

  stars = Array.from({length:180},()=>({
    x:Math.random()*w,
    y:Math.random()*h,
    z:Math.random()*2
  }));
}

document.addEventListener("mousemove",(e)=>{
  mx=(e.clientX-w/2)*0.0005;
  my=(e.clientY-h/2)*0.0005;
});

function animate(){
  ctx.fillStyle="#05060a";
  ctx.fillRect(0,0,w,h);

  for(let s of stars){
    s.x+=mx*s.z*5;
    s.y+=my*s.z*5;

    if(s.x<0)s.x=w;
    if(s.x>w)s.x=0;
    if(s.y<0)s.y=h;
    if(s.y>h)s.y=0;

    ctx.fillStyle="#00e5ff";
    ctx.fillRect(s.x,s.y,2,2);
  }

  requestAnimationFrame(animate);
}

init();
animate();
window.addEventListener("resize",init);
</script>

</body>
</html>
